# Asset class configuration
# Each class defines: investment type, default unit, visible fields, price source.
# Add new classes here — no code change required.
#
# Flags:
#   auto_fetch: true  — price is fetched automatically via yfinance (requires ticker)
#   auto_fetch: false — price must be entered manually (estimated_value in extra_data)
#   watchlist_eligible: true  — position can appear on the watchlist
#   watchlist_eligible: false — portfolio-only (Festgeld, Immobilien, etc.)
#   manual_valuation: true — "Schätzwert aktualisieren" button shown in detail view
#   extra_fields — type-specific fields stored in extra_data (JSON, encrypted)

asset_classes:

  Aktie:
    investment_type: Wertpapiere
    default_unit: Stück
    auto_fetch: true
    watchlist_eligible: true
    anlagearten:
      - Einzelaktie
      - ADR / GDR
    visible_fields:
      - isin
      - wkn
      - ticker
      - quantity
      - purchase_price
      - purchase_date
      - recommendation_source
      - strategy
      - notes
    price_source: yfinance
    requires_ticker: true

  Aktienfonds:
