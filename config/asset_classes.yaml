# Asset class configuration
# Each class defines: investment type, default unit, visible fields, price source.
# Add new classes here — no code change required.

asset_classes:

  Aktie:
    investment_type: Wertpapiere
    default_unit: Stück
    visible_fields:
      - isin
      - wkn
      - ticker
      - quantity
      - purchase_price
      - purchase_date
      - recommendation_source
      - strategy
      - notes
    price_source: yfinance
    requires_ticker: true

  Aktienfonds:
    investment_type: Wertpapiere
    default_unit: Stück
    visible_fields:
      - isin
      - wkn
      - ticker
      - quantity
      - purchase_price
