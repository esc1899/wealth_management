  legend_wächst: "Der Markt irrt sich zunehmend. Strukturelle Gelegenheit — halten oder aufstocken."
  legend_stabil: "Keine wesentliche Konsens-Verschiebung. These intakt — halten."
  legend_schließt: "Der Markt holt auf. Alpha nimmt ab — Ausstieg vorbereiten."
  legend_eingeholt: "These vollständig eingepreist. Position neu bewerten."
  what_is_this: "Was ist Konsens-Lücken-Analyse?"
  explanation: |
    Konsens-Lücken-Analyse misst für jede Position den **Abstand zwischen deiner Investment-These und dem Markt-Konsens**.

    Sie zeigt:
    - **Lücke wächst**: Der Markt divergiert immer weiter von deiner These ab. Strukturelle Gelegenheit.
    - **Stabil**: Keine wesentliche Verschiebung. Deine These bleibt intakt.
    - **Lücke schließt sich**: Der Markt nähert sich an. Dein Alpha nimmt ab.
    - **Eingeholt**: These vollständig im Preis eingepreist. Position neu bewerten.
