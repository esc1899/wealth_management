    Diese App speichert persönliche Portfoliodaten einschließlich Positionen und Transaktionen lokal auf Ihrer eigenen Infrastruktur. Es werden keine Daten von den Autoren dieses Projekts an externe Server übermittelt. Wenn Sie externe KI-Dienste wie die Anthropic API für Research-Funktionen konfigurieren und nutzen, werden Ihre Daten direkt von Ihrer Instanz an diesen Anbieter gesendet und unterliegen dessen jeweiliger Datenschutzerklärung und Nutzungsbedingungen. Sie sind allein verantwortlich für die Sicherheit Ihrer Deployment-Umgebung, Ihrer Daten und etwaiger API-Schlüssel. Speichern Sie keine sensiblen persönlichen Identifikatoren wie Steuer-IDs oder Bankkontonummern in dieser App.
