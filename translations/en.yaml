legal:
  modal_title: "Disclaimer & Privacy Notice"
  tab_disclaimer: "Disclaimer"
  tab_privacy: "Privacy Notice"
  disclaimer_text: |
    This app is for informational purposes only. AI-generated content does not constitute financial or investment advice. The authors accept no liability for financial losses based on information provided by this app. This software is provided as-is with no warranties of any kind.
  privacy_text: |
    This app stores personal portfolio data including holdings and transactions locally on your own infrastructure. No data is transmitted to any server by the authors of this project. When you configure and use external AI services such as the Anthropic API for research features, your data is sent directly from your instance to that provider and is subject to their respective privacy policy and terms of service. You are solely responsible for the security of your deployment, your data, and any API keys you configure. Do not store sensitive personal identifiers such as tax IDs or bank account numbers in this app.
  accept_checkbox: "I have read and accept the Disclaimer and Privacy Notice"
  continue_button: "Continue"
  legal_footer: "⚠️ Legal"

